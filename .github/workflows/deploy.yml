name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: fintech-dev
  ECS_CLUSTER: fintech-dev-cluster
  ECS_SERVICE: fintech-dev-service
  TERRAFORM_DIR: terraform

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Terraform state bucket
        continue-on-error: true
        run: |
          aws s3api create-bucket --bucket fintech-terraform-state-416772749566 --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws s3api put-bucket-versioning --bucket fintech-terraform-state-416772749566 --versioning-configuration Status=Enabled 2>/dev/null || true

      - name: Reset Terraform state and clean stale resources
        continue-on-error: true
        timeout-minutes: 10
        run: |
          # Reset state
          aws s3 rm s3://fintech-terraform-state-416772749566/dev/terraform.tfstate 2>/dev/null || true

          # Delete stale RDS instance and wait for completion
          aws rds delete-db-instance --db-instance-identifier fintech-dev-db --skip-final-snapshot || true
          if aws rds describe-db-instances --db-instance-identifier fintech-dev-db >/dev/null 2>&1; then
            echo "Waiting for RDS instance deletion..."
            aws rds wait db-instance-deleted --db-instance-identifier fintech-dev-db || true
          fi
          aws rds delete-db-parameter-group --db-parameter-group-name fintech-dev-pg-params || true
          aws rds delete-db-subnet-group --db-subnet-group-name fintech-dev-db-subnet-group || true

          # Delete stale ECR, secrets, log group
          aws ecr delete-repository --repository-name fintech-dev --force 2>/dev/null || true
          aws secretsmanager delete-secret --secret-id fintech/dev/db-connection --force-delete-without-recovery 2>/dev/null || true
          aws secretsmanager delete-secret --secret-id fintech/dev/jwt --force-delete-without-recovery 2>/dev/null || true
          aws logs delete-log-group --log-group-name /ecs/fintech-dev 2>/dev/null || true

          # Delete stale ALB
          ALB_ARN=$(aws elbv2 describe-load-balancers --names fintech-dev-alb --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null) || true
          if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
            aws elbv2 delete-load-balancer --load-balancer-arn "$ALB_ARN" 2>/dev/null || true
          fi

          # Delete stale IAM roles (detach policies first)
          aws iam detach-role-policy --role-name fintech-dev-ecs-execution-role --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy 2>/dev/null || true
          aws iam detach-role-policy --role-name fintech-dev-ecs-execution-role --policy-arn arn:aws:iam::416772749566:policy/fintech-dev-ecs-secrets-policy 2>/dev/null || true
          aws iam delete-role --role-name fintech-dev-ecs-execution-role 2>/dev/null || true
          aws iam delete-role --role-name fintech-dev-ecs-task-role 2>/dev/null || true
          aws iam delete-policy --policy-arn arn:aws:iam::416772749566:policy/fintech-dev-ecs-secrets-policy 2>/dev/null || true

          # Delete stale target group (after ALB deletion)
          sleep 5
          TG_ARN=$(aws elbv2 describe-target-groups --names fintech-dev-tg --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null) || true
          if [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ]; then
            aws elbv2 delete-target-group --target-group-arn "$TG_ARN" 2>/dev/null || true
          fi

          # Release all unassociated EIPs
          for alloc_id in $(aws ec2 describe-addresses --query 'Addresses[?!AssociationId].AllocationId' --output text 2>/dev/null); do
            aws ec2 release-address --allocation-id "$alloc_id" 2>/dev/null || true
          done

          # Delete stale FinTech VPCs
          for vpc_id in $(aws ec2 describe-vpcs --filters "Name=tag:Project,Values=FinTech" --query 'Vpcs[].VpcId' --output text 2>/dev/null); do
            echo "Deleting VPC: $vpc_id"
            # Delete NAT gateways
            for ngw_id in $(aws ec2 describe-nat-gateways --filter "Name=vpc-id,Values=$vpc_id" --query 'NatGateways[].NatGatewayId' --output text 2>/dev/null); do
              aws ec2 delete-nat-gateway --nat-gateway-id "$ngw_id" 2>/dev/null || true
            done
            sleep 5
            # Delete subnets
            for subnet_id in $(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$vpc_id" --query 'Subnets[].SubnetId' --output text 2>/dev/null); do
              aws ec2 delete-subnet --subnet-id "$subnet_id" 2>/dev/null || true
            done
            # Detach and delete IGWs
            for igw_id in $(aws ec2 describe-internet-gateways --filters "Name=attachment.vpc-id,Values=$vpc_id" --query 'InternetGateways[].InternetGatewayId' --output text 2>/dev/null); do
              aws ec2 detach-internet-gateway --internet-gateway-id "$igw_id" --vpc-id "$vpc_id" 2>/dev/null || true
              aws ec2 delete-internet-gateway --internet-gateway-id "$igw_id" 2>/dev/null || true
            done
            # Delete SGs (non-default)
            for sg_id in $(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$vpc_id" --query 'SecurityGroups[?GroupName!=`default`].GroupId' --output text 2>/dev/null); do
              aws ec2 delete-security-group --group-id "$sg_id" 2>/dev/null || true
            done
            # Delete route tables (non-main)
            for rt_id in $(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$vpc_id" --query 'RouteTables[?Associations[0].Main != `true`].RouteTableId' --output text 2>/dev/null); do
              aws ec2 delete-route-table --route-table-id "$rt_id" 2>/dev/null || true
            done
            # Delete VPC
            aws ec2 delete-vpc --vpc-id "$vpc_id" 2>/dev/null || true
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            -var="jwt_key=${{ secrets.TF_VAR_JWT_KEY }}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Force ECS redeployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment

      - name: Show ALB endpoint
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "Application URL: http://$ALB_DNS"
          echo "Swagger UI: http://$ALB_DNS/swagger/index.html"
